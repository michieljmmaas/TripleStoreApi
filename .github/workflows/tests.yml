name: CI - Run Tests

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
          cache: true

      - name: Display dotnet info
        run: dotnet --info

      - name: Restore
        run: dotnet restore TripleStoreApi.sln

      - name: Build
        run: dotnet build TripleStoreApi.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test TripleStoreApi.sln --configuration Release --no-build --verbosity normal
