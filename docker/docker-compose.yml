services:
  fuseki:
    image: stain/jena-fuseki:latest
    container_name: fuseki
    ports:
      - "3030:3030"
    environment:
      - ADMIN_PASSWORD=admin123
      - JVM_ARGS=-Xmx2g
    volumes:
      - ./data:/fuseki/data
    command: ["/jena-fuseki/fuseki-server", "--file=/fuseki/data/test-data.ttl", "/test"]

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: triplestore-app
    ports:
      - "3000:3000"
    environment:
      - ASPNETCORE_URLS=http://+:3000
      - Fuseki__EndpointUrl=http://fuseki:3030/test/query
    depends_on:
      - fuseki